<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORANGE STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0a0a0a; color: white; margin: 0; text-align: center; padding-bottom: 100px; }
        .ticker { background: #ff8c00; color: black; font-size: 13px; font-weight: 900; padding: 12px 0; overflow: hidden; position: sticky; top: 0; z-index: 1000; }
        .ticker-move { display: inline-block; animation: move 30s linear infinite; white-space: nowrap; }
        @keyframes move { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .ticker-move span { margin: 0 30px; }
        header { padding: 15px; border-bottom: 1px solid #222; }
        .logo { width: 70px; height: 70px; border-radius: 15px; border: 2px solid #ff8c00; }
        .container { width: 95%; max-width: 650px; margin: auto; }
        .player-box { background: #000; border: 2px solid #ff8c00; border-radius: 15px; overflow: hidden; margin: 15px 0; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .price-card { background: #151515; border: 1px solid #333; padding: 12px 2px; border-radius: 12px; position: relative; }
        .price-card.popular { border-color: #ff8c00; transform: scale(1.05); }
        .price-card h3 { font-size: 11px; margin: 5px 0; color: #888; }
        .price-card .cost { font-size: 15px; font-weight: 900; color: #ff8c00; }
        .channels-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 10px; background: #111; border-radius: 12px; }
        .channels-grid button { background: #222; color: #fff; border: 1px solid #333; padding: 10px 0; border-radius: 6px; font-size: 9px; font-weight: bold; cursor: pointer; font-family: 'Cairo'; }
        .channels-grid button.active { background: #ff8c00; color: black; }
        .float-contact { position: fixed; bottom: 15px; left: 10px; right: 10px; display: flex; gap: 10px; z-index: 9999; }
        .float-btn { flex: 1; padding: 12px; border-radius: 50px; text-decoration: none; color: white; font-weight: 900; font-size: 14px; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn-wa { background: #25d366; } .btn-tg { background: #0088cc; }
    </style>
</head>
<body>

<div class="ticker">
    <div class="ticker-move">
        <span>✅ أكثر من 7000 قناة</span>
        <span>⚽ جميع الدوريات والبطولات العالمية</span>
        <span>🎬 أفلام ومسلسلات بدون توقف</span>
        <span>🚀 سيرفرات قوية وبث ثابت</span>
        <span>📡 جودة HD / FHD / 4K</span>
    </div>
</div>

<header>
    <img src="https://llaaddzz.neocities.org/file_00000000b58071f5ab2fc62170e876ac.png" class="logo">
    <div style="font-size: 22px; color: #ff8c00; font-weight: 900; margin-top: 5px;">ORANGE STORE</div>
</header>

<div class="container">
    <div class="player-box"><video id="video" controls autoplay playsinline></video></div>
    <div class="pricing-grid">
        <div class="price-card"><h3>شهر</h3><div class="cost">5,000</div></div>
        <div class="price-card popular"><h3>سنة كاملة</h3><div class="cost">22,000</div></div>
        <div class="price-card"><h3>3 أشهر</h3><div class="cost">10,000</div></div>
    </div>
    <div class="channels-grid" id="grid"></div>
</div>

<div class="float-contact">
    <a href="https://wa.me/9647861627548" class="float-btn btn-wa">واتساب</a>
    <a href="https://t.me/alialiah123456" class="float-btn btn-tg">تليجرام</a>
</div>

<script>
    var video = document.getElementById('video');
    var hls = null;
    const links = [
        "https://stream.supertv.gg:3001/supertv/sport/stv1/ch1/ch1_360.m3u8","https://stream.supertv.gg:3001/supertv/sport/stv1/ch2/ch2_360.m3u8","https://stream.supertv.gg:3001/supertv/sport/stv1/ch3/ch3_360.m3u8","https://stream.supertv.gg:3001/supertv/sport/stv1/ch4/ch4_360.m3u8","https://stream.supertv.gg:3001/supertv/sport/stv1/ch5/ch5_360.m3u8","https://stream.supertv.gg:3001/supertv/sport/stv1/ch6/ch6_360.m3u8","https://stream.supertv.gg:3001/supertv/sport/stv1/ch7/ch7_360.m3u8","https://stream.supertv.gg:3001/supertv/sport/stv1/ch8/ch8_360.m3u8","https://stream.supertv.gg:3001/supertv/sport/stv1/ch9/ch9_360.m3u8","https://stream.supertv.gg:3001/supertv/sport/stv1/ch10/ch10_360.m3u8","https://stream.veo.buzz:6073/sport/ch1/ch1_360.m3u8","https://stream.veo.buzz:6073/sport/ch2/ch2_360.m3u8","https://stream.veo.buzz:6073/sport/ch3/ch3_360.m3u8","https://stream.veo.buzz:6073/sport/ch4/ch4_360.m3u8","https://stream.veo.buzz:6073/sport/ch5/ch5_360.m3u8","https://stream.veo.buzz:6073/sport/ch6/ch6_360.m3u8","https://stream.veo.buzz:6073/sport/ch7/ch7_360.m3u8","https://stream.veo.buzz:6073/sport/ch8/ch8_360.m3u8","https://stream.veo.buzz:6073/sport/ch9/ch9_360.m3u8","https://stream.veo.buzz:6073/sport/ch10/ch10_360.m3u8"
    ];

    function playChannel(url, btn) {
        document.querySelectorAll('.channels-grid button').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        if (Hls.isSupported()) {
            if (hls) hls.destroy();
            hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url; video.play();
        }
    }

    const grid = document.getElementById('grid');
    links.forEach((link, i) => {
        let btn = document.createElement('button');
        btn.innerText = "LIVE " + (i + 1);
        btn.onclick = function() { playChannel(link, this); };
        grid.appendChild(btn);
        if(i === 0) playChannel(link, btn);
    });
</script>
</body>
</html>
