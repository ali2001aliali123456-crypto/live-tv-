<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ORANGE STORE Sport</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:orange;
}

.player{
width:80%;
margin:auto;
}

video{
width:100%;
border:3px solid orange;
border-radius:10px;
}

.channels{
margin-top:20px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
background:orange;
color:black;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<h1>ORANGE STORE Sport</h1>

<div class="player">
<video id="video" controls autoplay></video>
</div>

<div class="channels">
<button onclick="playChannel(1)">ORANGE STORE sport 1</button>
<button onclick="playChannel(2)">ORANGE STORE sport 2</button>
<button onclick="playChannel(3)">ORANGE STORE sport 3</button>
</div>

<script>

var channels = {
1: "https://stream.supertv.gg:3001/supertv/sport/stv1/ch1/ch1_1080.m3u8",
2: "https://stream.supertv.gg:3001/supertv/sport/stv1/ch1/ch1_1080.m3u8",
3: "https://stream.supertv.gg:3001/supertv/sport/stv1/ch1/ch1_1080.m3u8"
};

function playChannel(num){

var video = document.getElementById("video");
var src = channels[num];

if(Hls.isSupported()){
var hls = new Hls();
hls.loadSource(src);
hls.attachMedia(video);
}

else if(video.canPlayType('application/vnd.apple.mpegurl')){
video.src = src;
}

}

playChannel(1);

</script>

</body>
</html>
